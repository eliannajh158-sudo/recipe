<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tang Yuan Cookies</title>
</head>

<body>
    <h1 lang="zh">汤圆 Cookies</h1>
    <a href="#ingredients">Ingredients</a>

    <hgroup id="ingredients">
        <h2>Ingredients (for 3 cookies): </h2>
        <ul>
            <li lang="zh">3 tang yuan (汤圆)</li>
            <li>28g butter</li>
            <li>45g flour (any type)</li>
            <li>20g sugar</li>
            <li>0.5g salt</li>
            <li lang="zh">0.3g baking powder (泡打粉)</li>
            <li lang="zh">0.3g baking soda (小苏打)</li>
            <li>1 egg</li>
            <li>4g milk</li>
        </ul>
    </hgroup>

</body>
</html>
